services:
  - type: web
    name: instat-lms-shared-demo
    runtime: docker
    plan: free
    region: singapore
    branch: demo/render-supabase-vercel
    rootDir: STAT-LMS
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://render-demo-lms-staging.cntest.uk
      - key: ASSET_URL
        value: https://render-demo-lms-staging.cntest.uk
      - key: APP_FORCE_HTTPS
        value: "true"
      - key: TRUSTED_PROXIES
        value: "*"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_RUNTIME
        value: server
      - key: DEMO_MATERIAL_DISK
        value: supabase
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_SCHEMA
        value: lms
      - key: DB_SSLMODE
        value: require
      - key: DB_URL
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: supabase
      - key: SUPABASE_S3_ENDPOINT
        sync: false
      - key: SUPABASE_S3_REGION
        value: ap-southeast-1
      - key: SUPABASE_S3_BUCKET
        value: lms-materials
      - key: SUPABASE_S3_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: CF_ACCESS_ENFORCED
        value: "true"
      - key: CF_ACCESS_TEAM_DOMAIN
        sync: false
      - key: CF_ACCESS_AUD
        sync: false
      - key: DEMO_RESET_HMAC_SECRET
        sync: false
